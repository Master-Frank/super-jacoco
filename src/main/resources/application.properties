spring.application.name=super-jacoco
server.port=8899
# 数据源配置
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.session.store-type=none
# Mybatis 配置
mybatis.typeAliasesPackage=com.xiaoju.basetech.entity
mybatis.mapper-locations=classpath*:mapper/*.xml
spring.resources.static-locations=file:${user.home}/report
spring.mvc.static-path-pattern=/**
spring.http.encoding.force=true

cov.security.enabled=true
cov.security.header=Authorization
cov.security.token=
cov.security.trustXForwardedFor=false
cov.security.ipAllowlist.enabled=false
cov.security.ipAllowlist=

cov.security.concurrencyLimit=2

cov.job.executor.corePoolSize=2
cov.job.executor.maxPoolSize=2
cov.job.executor.queueCapacity=0

cov.paths.codeRoot=${user.home}/app/super_jacoco/clonecode/
cov.paths.logRoot=${user.home}/report/logs/
cov.paths.reportRoot=${user.home}/report/
cov.paths.jacocoResourceRoot=${user.home}/resource/jacoco-resources
cov.paths.jacocoCliJar=${user.home}/org.jacoco.cli-1.0.2-SNAPSHOT-nodeps.jar
cov.paths.localCovRoot=${user.home}/cover/
# 以下信息需要手动配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/super-jacoco?useUnicode=true&amp;characterEncoding=utf8
spring.datasource.username=
spring.datasource.password=
#git username & password
gitlab.username=
gitlab.password=
