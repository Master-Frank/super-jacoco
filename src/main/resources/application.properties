spring.application.name=super-jacoco
server.port=8899
# 数据源配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.session.store-type=none
# Mybatis 配置
mybatis.typeAliasesPackage=com.xiaoju.basetech.entity
mybatis.mapper-locations=classpath*:mapper/*.xml
spring.web.resources.static-locations=file:${user.dir}/report
spring.mvc.static-path-pattern=/**
server.servlet.encoding.force=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

cov.security.enabled=false
cov.security.header=Authorization
cov.security.token=
cov.security.trustXForwardedFor=false
cov.security.ipAllowlist.enabled=false
cov.security.ipAllowlist=

cov.security.concurrencyLimit=2

cov.job.executor.corePoolSize=2
cov.job.executor.maxPoolSize=2
cov.job.executor.queueCapacity=0

cov.job.env.fixedDelay=10000
cov.job.env.initialDelay=10000

cov.paths.codeRoot=${user.home}/app/super_jacoco/clonecode/
cov.paths.logRoot=${user.dir}/report/logs/
cov.paths.reportRoot=${user.dir}/report/
cov.paths.jacocoResourceRoot=${user.dir}/jacoco/jacoco-resources/jacoco-resources
cov.paths.jacocoCliJar=${user.dir}/jacoco/org.jacoco.cli-0.8.14-nodeps.jar
cov.paths.localCovRoot=${user.dir}/report/localcov/
# 以下信息需要手动配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/super-jacoco?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
#git username & password
gitlab.username=
gitlab.password=
